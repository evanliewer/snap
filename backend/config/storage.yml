test:
  service: Disk
  root: <%= Rails.root.join("tmp/storage") %>

local:
  service: Disk
  root: <%= Rails.root.join("storage") %>

# S3-compatible object storage (Amazon S3, Cloudflare R2, Backblaze B2, etc.).
# Rails generates a /rails/active_storage/blobs/redirect/... URL that 302s to a
# short-lived presigned URL, so the bucket can stay private.
#
# request_checksum_calculation: when_required disables the AWS SDK v1.221+ default
# of always adding the x-amz-sdk-checksum-algorithm header, which Cloudflare R2
# rejects with an opaque 500. See https://github.com/aws/aws-sdk-ruby/issues/3142
s3:
  service: S3
  access_key_id: <%= ENV["S3_ACCESS_KEY_ID"] %>
  secret_access_key: <%= ENV["S3_SECRET_ACCESS_KEY"] %>
  region: <%= ENV.fetch("S3_REGION", "auto") %>
  bucket: <%= ENV["S3_BUCKET"] %>
  endpoint: <%= ENV["S3_ENDPOINT"] %>
  force_path_style: <%= ENV.fetch("S3_FORCE_PATH_STYLE", "true") == "true" %>
  request_checksum_calculation: when_required
  response_checksum_validation: when_required
  public: false
