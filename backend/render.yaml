databases:
  - name: snap-postgres
    plan: free
    databaseName: snap_production
    user: snap

services:
  - type: web
    name: snap-backend
    env: docker
    plan: free
    region: oregon
    autoDeploy: true
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /up
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: snap-postgres
          property: connectionString
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_TO_STDOUT
        value: "true"
      - key: RAILS_SERVE_STATIC_FILES
        value: "true"
      - key: RAILS_MASTER_KEY
        sync: false
      - key: APP_HOST
        sync: false
      # --- Optional S3-compatible object storage for photo uploads ---
      # When unset, Active Storage falls back to local disk (photos are lost on redeploy).
      - key: S3_BUCKET
        sync: false
      - key: S3_REGION
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_ENDPOINT
        sync: false
